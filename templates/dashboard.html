<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Visualization Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <h1>Workflow Visualization Dashboard</h1>
    <div id="workflow-plot" style="width:100%;height:600px;"></div>

    <script>
        async function fetchTaskStates(submissionName) {
            const response = await fetch(`/api/task-states/${submissionName}/`);
            const data = await response.json();
            return data;
        }

        async function updateVisualization() {
            const taskStates = await fetchTaskStates('{{ submission_name }}');  // Replace with actual submission name

            const nodes = [];
            const links = [];
            const stateColorMap = {
                'completed': 'green',
                'running': 'yellow',
                'pending': 'red',
                'failed': 'grey'
            };

            Object.keys(taskStates).forEach(taskName => {
                const task = taskStates[taskName];
                nodes.push({
                    id: taskName,
                    label: task.task_name,
                    group: task.state,
                    color: stateColorMap[task.state] || 'lightgreen'
                });

                task.dependencies.forEach(dep => {
                    links.push({source: dep, target: taskName});
                });
            });

            const nodeData = nodes.map(node => ({
                x: [node.id],
                y: [node.label],
                text: node.label,
                mode: 'markers+text',
                marker: {
                    color: node.color,
                    size: 10,
                    line: {width: 2}
                }
            }));

            const edgeData = links.map(link => ({
                type: 'scatter',
                x: [link.source, link.target],
                y: [link.source, link.target],
                line: {width: 1, color: 'black'},
                hoverinfo: 'none',
                mode: 'lines'
            }));

            const data = [...nodeData, ...edgeData];

            const layout = {
                title: 'Dynamic Workflow Execution Visualization',
                showlegend: false,
                height: 600,
                width: 1000
            };


            Plotly.react('workflow-plot', [data], layout);
        }

        setInterval(updateVisualization, 5000);  // Update every 5 seconds
        updateVisualization();  // Initial call to display the data
    </script>
</body>
</html>
